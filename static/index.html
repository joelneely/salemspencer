<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Helper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Web Helper</h1>
        </header>
        
        <main>
            <div class="input-section">
                <label for="input-text">Input Text:</label>
                <textarea id="input-text" rows="5" cols="60" placeholder="Enter your text here..."></textarea>
            </div>
            
            <div class="button-section">
                <button id="submit-btn" type="button">Submit</button>
            </div>
            
            <div class="output-section">
                <label for="standardized-text">Standardized Input:</label>
                <textarea id="standardized-text" rows="5" cols="60" wrap="soft" readonly></textarea>
            </div>
            
            <div class="output-section">
                <label for="result-text">Result:</label>
                <textarea id="result-text" rows="5" cols="60" wrap="soft" readonly></textarea>
                <div class="button-section">
                    <button id="copy-btn" type="button" aria-label="Copy result to clipboard">Copy to Clipboard</button>
                    <span id="copy-feedback" class="copy-feedback" role="status" aria-live="polite" aria-atomic="true"></span>
                </div>
            </div>
            
            <div class="button-section shutdown-section">
                <button id="shutdown-btn" type="button" aria-label="Shut down the server">Shut down</button>
            </div>
        </main>
    </div>
    
    <script>
        const inputTextarea = document.getElementById('input-text');
        const standardizedTextarea = document.getElementById('standardized-text');
        const resultTextarea = document.getElementById('result-text');
        const submitBtn = document.getElementById('submit-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyFeedback = document.getElementById('copy-feedback');
        const shutdownBtn = document.getElementById('shutdown-btn');
        
        // Handle form submission
        submitBtn.addEventListener('click', async () => {
            const input = inputTextarea.value;
            
            if (!input.trim()) {
                alert('Please enter some text to process.');
                return;
            }
            
            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ input: input }),
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                standardizedTextarea.value = data.standardized;
                resultTextarea.value = data.result;
            } catch (error) {
                console.error('Error processing input:', error);
                alert('Error processing input. Please try again.');
            }
        });
        
        // Check if clipboard API is available
        const isClipboardAPIAvailable = () => {
            return navigator.clipboard && typeof navigator.clipboard.writeText === 'function';
        };

        // Check if execCommand fallback is available
        const isExecCommandAvailable = () => {
            return document.queryCommandSupported && document.queryCommandSupported('copy');
        };

        // Fallback copy using execCommand
        const copyWithExecCommand = (text) => {
            return new Promise((resolve, reject) => {
                // Create a temporary textarea element
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-999999px';
                textarea.style.top = '-999999px';
                document.body.appendChild(textarea);
                
                // Select and copy
                textarea.select();
                textarea.setSelectionRange(0, text.length);
                
                try {
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (successful) {
                        resolve();
                    } else {
                        reject(new Error('execCommand copy failed'));
                    }
                } catch (err) {
                    document.body.removeChild(textarea);
                    reject(err);
                }
            });
        };

        // Main copy function with fallback
        const copyToClipboard = async (text) => {
            if (isClipboardAPIAvailable()) {
                try {
                    await navigator.clipboard.writeText(text);
                    return { success: true, method: 'clipboard-api' };
                } catch (error) {
                    // If clipboard API fails, try fallback
                    if (error.name === 'NotAllowedError') {
                        throw new Error('Permission denied. Please allow clipboard access.');
                    } else if (error.name === 'NotFoundError') {
                        throw new Error('Clipboard not found.');
                    } else {
                        // Try fallback for other errors
                        if (isExecCommandAvailable()) {
                            try {
                                await copyWithExecCommand(text);
                                return { success: true, method: 'execCommand-fallback' };
                            } catch (fallbackError) {
                                throw new Error('Copy failed. Please try selecting and copying manually.');
                            }
                        } else {
                            throw new Error('Copy not supported in this browser.');
                        }
                    }
                }
            } else if (isExecCommandAvailable()) {
                // Use fallback if Clipboard API is not available
                try {
                    await copyWithExecCommand(text);
                    return { success: true, method: 'execCommand' };
                } catch (error) {
                    throw new Error('Copy failed. Please try selecting and copying manually.');
                }
            } else {
                throw new Error('Copy to clipboard is not supported in this browser.');
            }
        };

        // Show feedback message
        const showCopyFeedback = (message, isError = false) => {
            copyFeedback.textContent = message;
            copyFeedback.className = 'copy-feedback';
            if (isError) {
                copyFeedback.classList.add('error');
            } else {
                copyFeedback.classList.add('show');
            }
            
            // Clear feedback after appropriate timeout
            const timeout = isError ? 4000 : 2000;
            setTimeout(() => {
                copyFeedback.classList.remove('show', 'error');
                setTimeout(() => {
                    copyFeedback.textContent = '';
                }, 300);
            }, timeout);
        };

        // Handle copy to clipboard
        copyBtn.addEventListener('click', async () => {
            const resultText = resultTextarea.value;
            
            if (!resultText.trim()) {
                showCopyFeedback('No result to copy. Please submit some text first.', true);
                return;
            }
            
            // Show copying state
            copyBtn.disabled = true;
            copyBtn.textContent = 'Copying...';
            
            try {
                const result = await copyToClipboard(resultText);
                showCopyFeedback('Copied!');
                console.log('Copy successful using method:', result.method);
            } catch (error) {
                console.error('Error copying to clipboard:', error);
                showCopyFeedback(error.message || 'Failed to copy to clipboard. Please try again.', true);
            } finally {
                copyBtn.disabled = false;
                copyBtn.textContent = 'Copy to Clipboard';
            }
        });

        // Keyboard support for copy button
        copyBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                copyBtn.click();
            }
        });
        
        // Allow Enter key to submit (Ctrl+Enter or Cmd+Enter)
        inputTextarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                submitBtn.click();
            }
        });

        // Disable copy button if clipboard is not supported
        (() => {
            if (!isClipboardAPIAvailable() && !isExecCommandAvailable()) {
                copyBtn.disabled = true;
                copyBtn.title = 'Copy to clipboard is not supported in this browser';
                copyBtn.setAttribute('aria-disabled', 'true');
            }
        })();

        // Handle shutdown button
        shutdownBtn.addEventListener('click', async () => {
            // Confirm shutdown action
            if (!confirm('Are you sure you want to shut down the server? This will stop the server and close this tab.')) {
                return;
            }

            // Disable button and show feedback
            shutdownBtn.disabled = true;
            shutdownBtn.textContent = 'Shutting down...';

            try {
                const response = await fetch('/api/shutdown', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Shutdown response:', data);

                // Attempt to close the browser tab
                // Note: This may be blocked by browser security policies
                window.close();

                // If tab doesn't close within 1 second, show message
                setTimeout(() => {
                    if (!document.hidden) {
                        alert('Server has been shut down. Please close this tab manually.');
                    }
                }, 1000);
            } catch (error) {
                console.error('Error shutting down server:', error);
                alert('Failed to shut down server. Please try again or use Ctrl+C in the terminal.');
                shutdownBtn.disabled = false;
                shutdownBtn.textContent = 'Shut down';
            }
        });

        // Keyboard support for shutdown button
        shutdownBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                shutdownBtn.click();
            }
        });
    </script>
</body>
</html>
