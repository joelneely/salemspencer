<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Helper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Web Helper</h1>
        </header>
        
        <main>
            <div class="input-section">
                <label for="input-text">Input Text:</label>
                <textarea id="input-text" rows="5" cols="60" placeholder="Enter your text here..."></textarea>
            </div>
            
            <div class="button-section">
                <button id="submit-btn" type="button">Submit</button>
            </div>
            
            <div class="output-section">
                <label for="standardized-text">Standardized Input:</label>
                <textarea id="standardized-text" rows="5" cols="60" readonly></textarea>
            </div>
            
            <div class="output-section">
                <label for="result-text">Result:</label>
                <textarea id="result-text" rows="5" cols="60" readonly></textarea>
                <div class="button-section">
                    <button id="copy-btn" type="button">Copy to Clipboard</button>
                    <span id="copy-feedback" class="copy-feedback"></span>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        const inputTextarea = document.getElementById('input-text');
        const standardizedTextarea = document.getElementById('standardized-text');
        const resultTextarea = document.getElementById('result-text');
        const submitBtn = document.getElementById('submit-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyFeedback = document.getElementById('copy-feedback');
        
        // Handle form submission
        submitBtn.addEventListener('click', async () => {
            const input = inputTextarea.value;
            
            if (!input.trim()) {
                alert('Please enter some text to process.');
                return;
            }
            
            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ input: input }),
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                standardizedTextarea.value = data.standardized;
                resultTextarea.value = data.result;
            } catch (error) {
                console.error('Error processing input:', error);
                alert('Error processing input. Please try again.');
            }
        });
        
        // Handle copy to clipboard
        copyBtn.addEventListener('click', async () => {
            const resultText = resultTextarea.value;
            
            if (!resultText.trim()) {
                alert('No result to copy. Please submit some text first.');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(resultText);
                copyFeedback.textContent = 'Copied!';
                copyFeedback.classList.add('show');
                
                // Clear feedback after 2 seconds
                setTimeout(() => {
                    copyFeedback.classList.remove('show');
                    setTimeout(() => {
                        copyFeedback.textContent = '';
                    }, 300);
                }, 2000);
            } catch (error) {
                console.error('Error copying to clipboard:', error);
                alert('Failed to copy to clipboard. Please try again.');
            }
        });
        
        // Allow Enter key to submit (Ctrl+Enter or Cmd+Enter)
        inputTextarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
